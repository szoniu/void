#!/usr/bin/env bash
# Example Void Linux TUI Installer Preset
# This preset provides sensible defaults for a KDE Plasma desktop
# Hardware-specific values (disk, GPU) will be re-detected on import

FILESYSTEM='ext4'
SWAP_TYPE='zram'
HOSTNAME='void'
TIMEZONE='Europe/Warsaw'
LOCALE='en_US.UTF-8'
KEYMAP='us'
KERNEL_TYPE='mainline'
DESKTOP_EXTRAS='firefox thunderbird'
USER_GROUPS='wheel,audio,video,input,storage,network'
EXTRA_PACKAGES='fastfetch btop kitty'
ENABLE_NONFREE='no'
